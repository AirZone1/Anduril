<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anduril - Agent Task Manager</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-left">
                <i data-lucide="sword"></i>
                <h1>Anduril - Agent Task Manager</h1>
            </div>
            <div class="header-right">
                <span class="status-indicator" id="syncStatus">
                    <i data-lucide="refresh-cw" class="spin"></i>
                    Syncing...
                </span>
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle Theme">
                    <i data-lucide="sun" class="light-icon"></i>
                    <i data-lucide="moon" class="dark-icon"></i>
                </button>
            </div>
        </header>

        <main class="main-content">
            <section class="add-task-section card">
                <h2>New Task</h2>
                <div class="add-task-form">
                    <div class="form-row">
                        <select id="taskPriority" style="margin-bottom: 12px;">
                            <option value="Normal">🟢 Normal</option>
                            <option value="High">🟡 High</option>
                            <option value="Urgent">🔴 Urgent</option>
                        </select>
                    </div>
                    <textarea id="taskDescription" placeholder="Task details... Paste images/files (Ctrl+V) or drag & drop them here"></textarea>
                    
                    <div class="form-actions">
                        <div class="form-actions-left">
                            <input type="file" id="taskFileSelect" style="display: none;" multiple>
                            <button type="button" id="attachFileBtn" class="btn btn-secondary" title="Attach file or image">
                                <i data-lucide="paperclip"></i> Attach File
                            </button>
                            <span class="hint">Paste or drop files directly!</span>
                        </div>
                        <button id="addTaskBtn" class="btn btn-primary">
                            <i data-lucide="plus"></i> Add Task
                        </button>
                    </div>
                </div>
            </section>

            <div class="tasks-container">
                <section class="priority-section" id="section-Urgent">
                    <h3 class="priority-title urgent" onclick="toggleSection('Urgent')">
                        <i data-lucide="chevron-down" class="collapse-icon" id="icon-Urgent"></i>
                        <i data-lucide="alert-triangle"></i>
                        <span class="section-name">Urgent</span>
                        <span class="count-badge" id="count-Urgent">(0)</span>
                    </h3>
                    <div class="task-list" id="list-Urgent"></div>
                </section>

                <section class="priority-section" id="section-High">
                    <h3 class="priority-title high" onclick="toggleSection('High')">
                        <i data-lucide="chevron-down" class="collapse-icon" id="icon-High"></i>
                        <i data-lucide="alert-circle"></i>
                        <span class="section-name">High</span>
                        <span class="count-badge" id="count-High">(0)</span>
                    </h3>
                    <div class="task-list" id="list-High"></div>
                </section>

                <section class="priority-section" id="section-Normal">
                    <h3 class="priority-title normal" onclick="toggleSection('Normal')">
                        <i data-lucide="chevron-down" class="collapse-icon" id="icon-Normal"></i>
                        <i data-lucide="check-circle"></i>
                        <span class="section-name">Normal</span>
                        <span class="count-badge" id="count-Normal">(0)</span>
                    </h3>
                    <div class="task-list" id="list-Normal"></div>
                </section>

                <section class="priority-section" id="section-Done">
                    <h3 class="priority-title done">
                        <div class="done-title-left" onclick="toggleSection('Done')">
                            <i data-lucide="chevron-down" class="collapse-icon" id="icon-Done"></i>
                            <i data-lucide="archive"></i>
                            <span class="section-name">Completed</span>
                            <span class="count-badge" id="count-Done">(0)</span>
                        </div>
                        <button id="clearAllDoneBtn" class="btn btn-danger btn-sm">
                            <i data-lucide="trash-2"></i> Clear Completed
                        </button>
                    </h3>
                    <div class="task-list" id="list-Done"></div>
                </section>
            </div>
        </main>

        <footer class="app-footer">
            <p>Made by AirZone</p>
        </footer>
    </div>

    <template id="task-template">
        <div class="task-card">
            <div class="task-view">
                <div class="task-header">
                    <label class="checkbox-container">
                        <input type="checkbox" class="task-checkbox">
                        <span class="checkmark"></span>
                    </label>
                    <div class="task-actions">
                        <button class="edit-btn" aria-label="Edit Task">
                            <i data-lucide="edit-2"></i>
                        </button>
                        <button class="delete-btn" aria-label="Delete Task">
                            <i data-lucide="trash-2"></i>
                        </button>
                    </div>
                </div>
                <div class="task-body markdown-body"></div>
            </div>
            <div class="task-edit" style="display: none;">
                <div class="inline-edit-form">
                    <div class="form-row">
                        <select class="edit-priority" style="margin-bottom: 12px;">
                            <option value="Normal">🟢 Normal</option>
                            <option value="High">🟡 High</option>
                            <option value="Urgent">🔴 Urgent</option>
                        </select>
                    </div>
                    <textarea class="edit-desc" placeholder="Task details..."></textarea>
                    <div class="inline-edit-actions">
                        <input type="file" class="edit-file-select" style="display: none;" multiple>
                        <button class="btn btn-secondary edit-attach-btn">
                            <i data-lucide="paperclip"></i> Attach File
                        </button>
                        <button class="btn cancel-edit-btn">Cancel</button>
                        <button class="btn btn-primary save-edit-btn">Save Changes</button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
